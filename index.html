<!DOCTYPE html>
<html>
<head>
<title>Mysterious</title>

<style>
body {
  margin: 0;
  background: #ffffff;
  color: #111;
  font-family: monospace;
}

/* center text */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* hidden ghost trigger */
.ghost-trigger {
  position: fixed;
  bottom: 8px;
  right: 8px;
  width: 6px;
  height: 6px;
  background: #f5f5f5;
  opacity: 0.15;
}

.ghost-trigger:hover {
  opacity: 0.5;
}
</style>

</head>

<body>

<div class="center">
  Mysterious
</div>

<a href="/hidden/index.html" class="ghost-trigger"></a>

</body>
</html>
